<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta name="google-site-verification" content="sgjLvhLOPU09f1JAdQ248JH9i3XtpUjsSf-qJpWOQSQ" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AiTool.so - 发现最好的 AI 工具</title>
<meta name="description" content="发现最好用的人工智能工具。精选 AI 对话、绘画、视频、编程、写作等 10 大分类工具导航。">
<meta name="keywords" content="AI工具,人工智能,ChatGPT,Midjourney,AI导航,工具推荐">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#129302;</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#6C5CE7;--pl:#A29BFE;--s:#00CEC9;--bg:#0F0F1A;--cb:#1A1A2E;--ch:#232342;--t:#E8E8F0;--td:#8888AA;--bd:#2A2A45;--ac:#FD79A8;--ok:#00B894}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);line-height:1.6;min-height:100vh}
header{background:linear-gradient(135deg,rgba(108,92,231,.15),rgba(0,206,201,.1));border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.hi{max-width:1200px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--pl),var(--s));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.logo span{font-size:14px;-webkit-text-fill-color:var(--td);margin-left:8px;font-weight:400}
nav a{color:var(--td);text-decoration:none;margin-left:28px;font-size:15px;transition:color .2s}
nav a:hover{color:var(--t)}
.hero{text-align:center;padding:80px 24px 60px;background:radial-gradient(ellipse at center,rgba(108,92,231,.08),transparent 70%)}
.hero h1{font-size:48px;font-weight:800;margin-bottom:16px;background:linear-gradient(135deg,#fff,var(--pl));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:18px;color:var(--td);max-width:600px;margin:0 auto 40px}
.sb{max-width:640px;margin:0 auto;position:relative}
.sb input{width:100%;padding:16px 24px 16px 52px;border-radius:16px;border:1px solid var(--bd);background:var(--cb);color:var(--t);font-size:16px;outline:none;transition:border-color .3s,box-shadow .3s}
.sb input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(108,92,231,.2)}
.sb::before{content:"\1F50D";position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:18px}
.stats{display:flex;justify-content:center;gap:48px;margin-top:40px}
.stat{text-align:center}
.sn{font-size:32px;font-weight:800;color:var(--s)}
.sl{font-size:14px;color:var(--td);margin-top:4px}
.sec{max-width:1200px;margin:0 auto;padding:60px 24px}
.st{font-size:28px;font-weight:700;margin-bottom:32px;display:flex;align-items:center;gap:12px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:60px}
.cc{background:var(--cb);border:1px solid var(--bd);border-radius:16px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .3s;text-decoration:none;color:var(--t)}
.cc:hover{transform:translateY(-4px);border-color:var(--p);box-shadow:0 8px 32px rgba(108,92,231,.2)}
.cc.active{border-color:var(--p);background:rgba(108,92,231,.1)}
.ci{font-size:36px;margin-bottom:12px}
.cn{font-size:15px;font-weight:600}
.ct{font-size:12px;color:var(--td);margin-top:4px}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.tc{background:var(--cb);border:1px solid var(--bd);border-radius:16px;padding:24px;transition:all .3s;display:flex;flex-direction:column;text-decoration:none;color:var(--t)}
.tc:hover{transform:translateY(-4px);border-color:var(--p);box-shadow:0 8px 32px rgba(108,92,231,.15)}
.th{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.ticon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--p),var(--s));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.tn{font-size:18px;font-weight:700}
.tp{font-size:12px;color:var(--ok);background:rgba(0,184,148,.1);padding:2px 10px;border-radius:20px;margin-top:4px;display:inline-block}
.tdesc{font-size:14px;color:var(--td);margin-bottom:16px;flex:1;line-height:1.7}
.tf{display:flex;align-items:center;justify-content:space-between}
.ttags{display:flex;gap:6px;flex-wrap:wrap}
.tt{font-size:12px;color:var(--td);background:rgba(136,136,170,.1);padding:4px 10px;border-radius:6px}
.tr{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:600;color:#FDCB6E}
.fb{background:linear-gradient(135deg,var(--ac),var(--p));color:white;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;margin-left:8px}
.fbar{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;align-items:center}
.fbtn{padding:8px 18px;border-radius:10px;border:1px solid var(--bd);background:transparent;color:var(--td);cursor:pointer;font-size:14px;transition:all .2s}
.fbtn:hover{border-color:var(--p);color:var(--t)}
.fbtn.active{background:var(--p);color:white;border-color:var(--p)}
.ss{background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(0,206,201,.05));border-radius:24px;padding:48px;margin:60px auto;max-width:800px;text-align:center}
.ss h2{font-size:28px;margin-bottom:12px}
.ss p{color:var(--td);margin-bottom:32px}
.sf{display:flex;gap:12px;max-width:500px;margin:0 auto}
.sf input{flex:1;padding:14px 20px;border-radius:12px;border:1px solid var(--bd);background:var(--cb);color:var(--t);font-size:15px;outline:none}
.sf button{padding:14px 28px;border-radius:12px;border:none;background:var(--p);color:white;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap}
.sf button:hover{background:var(--pl)}
footer{border-top:1px solid var(--bd);padding:40px 24px;text-align:center;color:var(--td);font-size:14px}
footer a{color:var(--pl);text-decoration:none}
.toast{position:fixed;bottom:24px;right:24px;background:var(--ok);color:white;padding:14px 24px;border-radius:12px;font-weight:600;opacity:0;transform:translateY(20px);transition:all .3s;z-index:1000}
.toast.show{opacity:1;transform:translateY(0)}
.nr{text-align:center;padding:60px 24px;color:var(--td)}
.btt{position:fixed;bottom:32px;right:32px;width:48px;height:48px;border-radius:50%;background:var(--p);color:white;border:none;font-size:20px;cursor:pointer;opacity:0;transform:translateY(20px);transition:all .3s;z-index:99;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(108,92,231,.3)}
.btt.vis{opacity:1;transform:translateY(0)}
.btt:hover{background:var(--pl);transform:translateY(-2px)}
.ttg{background:none;border:1px solid var(--bd);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:18px;transition:all .2s;color:var(--t)}
.ttg:hover{border-color:var(--p)}
body.light{--bg:#F5F5FA;--cb:#FFFFFF;--ch:#F0F0F8;--t:#1A1A2E;--td:#666688;--bd:#DDDDE8}
body.light header{background:linear-gradient(135deg,rgba(108,92,231,.08),rgba(0,206,201,.05))}
body.light .sb input,body.light .cc,body.light .tc{background:#fff;border-color:var(--bd)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.tc{animation:fadeInUp .4s ease-out}
@media(max-width:768px){.hero h1{font-size:32px}.stats{gap:24px}.tg{grid-template-columns:1fr}.cg{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}.hi{flex-wrap:wrap;gap:12px}nav a{margin-left:16px}.sf{flex-direction:column}}
</style>
</head>
<body>
<header>
<div class="hi">
<a href="/" class="logo">AiTool.so <span>AI 工具导航</span></a>
<nav>
<a href="#categories">分类</a>
<a href="#tools">工具</a>
<a href="#submit">提交</a>
<a href="#about">关于</a>
<button class="ttg" id="themeToggle" onclick="toggleTheme()">&#127769;</button>
</nav>
</div>
</header>

<section class="hero">
<h1>发现最好的 AI 工具</h1>
<p>精选 AI 对话、绘画、视频、编程、写作等 10 大分类工具导航，帮你找到最适合的 AI 利器</p>
<div class="sb">
<input type="text" id="searchInput" placeholder="搜索 AI 工具...">
</div>
<div class="stats">
<div class="stat"><div class="sn" id="toolCount">0</div><div class="sl">AI 工具</div></div>
<div class="stat"><div class="sn">10</div><div class="sl">分类</div></div>
<div class="stat"><div class="sn">每日</div><div class="sl">持续更新</div></div>
</div>
</section>

<section class="sec" id="categories">
<div class="st">&#128194; 工具分类</div>
<div class="cg" id="categoryGrid"></div>
</section>

<section class="sec" id="tools">
<div class="st">&#128293; 热门工具</div>
<div class="fbar" id="filterBar">
<button class="fbtn active" data-filter="all">全部</button>
<button class="fbtn" data-filter="featured">&#11088; 精选</button>
<button class="fbtn" data-filter="free">&#127873; 免费</button>
<button class="fbtn" data-filter="popular">&#128293; 最热</button>
</div>
<div class="tg" id="toolGrid"></div>
<div class="nr" id="noResults" style="display:none">
<div style="font-size:48px;margin-bottom:16px">&#128269;</div>
<p>没有找到匹配的工具，试试其他关键词？</p>
</div>
</section>

<section class="ss" id="submit">
<h2>&#128640; 提交你的 AI 工具</h2>
<p>发现了好用的 AI 工具？提交给我们，审核通过后免费收录</p>
<div class="sf">
<input type="email" id="submitEmail" placeholder="你的邮箱">
<input type="url" id="submitUrl" placeholder="工具网址 (https://...)">
<button onclick="submitTool()">提交工具</button>
</div>
</section>

<footer id="about">
<p style="margin-bottom:12px"><a href="/">AiTool.so</a> &#183; 发现最好的 AI 工具</p>
<p>&#169; 2026 AiTool.so &#183; 持续收录最优质的 AI 工具</p>
<p style="margin-top:12px;font-size:12px">联系我们：hello@aitool.so &#183; <a href="https://twitter.com/aitoolso" target="_blank">Twitter</a></p>
</footer>

<div class="toast" id="toast"></div>
<button class="btt" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>

<script>
var toolsData=[],categoriesData=[],currentCategory='all',currentFilter='all';

function init(){
fetch('./data/tools.json').then(function(r){return r.json()}).then(function(data){
toolsData=data.tools;categoriesData=data.categories;
renderCategories();renderTools();setupSearch();setupFilters();
document.getElementById('toolCount').textContent=toolsData.length;
}).catch(function(e){console.error('Load failed:',e)});
}

function renderCategories(){
var g=document.getElementById('categoryGrid');
g.innerHTML=categoriesData.map(function(cat){
var c=toolsData.filter(function(t){return t.category===cat.id}).length;
return '<a class="cc'+(currentCategory===cat.id?' active':'')+'" onclick="filterByCategory(\''+cat.id+'\')" href="#tools">'+
'<div class="ci">'+cat.icon+'</div>'+
'<div class="cn">'+cat.name+'</div>'+
'<div class="ct">'+c+' 个工具</div></a>';
}).join('');
}

function renderTools(){
var g=document.getElementById('toolGrid'),nr=document.getElementById('noResults');
var f=toolsData.slice();
if(currentCategory!=='all')f=f.filter(function(t){return t.category===currentCategory});
var q=document.getElementById('searchInput').value.toLowerCase().trim();
if(q)f=f.filter(function(t){
return t.name.toLowerCase().indexOf(q)>=0||t.nameZh.indexOf(q)>=0||
t.description.indexOf(q)>=0||t.tags.some(function(tag){return tag.indexOf(q)>=0});
});
if(currentFilter==='featured')f=f.filter(function(t){return t.featured});
else if(currentFilter==='free')f=f.filter(function(t){return t.pricing.indexOf('免费')>=0||t.pricing.indexOf('开源')>=0});
else if(currentFilter==='popular')f=f.sort(function(a,b){return b.rating-a.rating});
if(f.length===0){g.innerHTML='';nr.style.display='block';return}
nr.style.display='none';
g.innerHTML=f.map(function(tool,i){
var cat=categoriesData.find(function(c){return c.id===tool.category});
return '<a href="tool.html?id='+tool.id+'" class="tc" style="animation-delay:'+i*0.05+'s">'+
'<div class="th"><div class="ticon">'+(cat?cat.icon:'&#129302;')+'</div><div>'+
'<div class="tn">'+tool.nameZh+(tool.featured?'<span class="fb">精选</span>':'')+'</div>'+
'<div class="tp">'+tool.pricing+'</div></div></div>'+
'<div class="tdesc">'+tool.description+'</div>'+
'<div class="tf"><div class="ttags">'+tool.tags.slice(0,3).map(function(t){return '<span class="tt">'+t+'</span>'}).join('')+
'</div><div class="tr">&#11088; '+tool.rating+'</div></div></a>';
}).join('');
}

function filterByCategory(id){
currentCategory=currentCategory===id?'all':id;
renderCategories();renderTools();
var title=document.querySelector('#tools .st');
if(currentCategory==='all')title.innerHTML='&#128293; 热门工具';
else{var cat=categoriesData.find(function(c){return c.id===currentCategory});
title.innerHTML=cat.icon+' '+cat.name;}
}

function setupSearch(){
var input=document.getElementById('searchInput'),debounce;
input.addEventListener('input',function(){
clearTimeout(debounce);
debounce=setTimeout(function(){currentCategory='all';renderCategories();renderTools()},200);
});
}

function setupFilters(){
document.querySelectorAll('.fbtn').forEach(function(btn){
btn.addEventListener('click',function(){
document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active')});
btn.classList.add('active');currentFilter=btn.dataset.filter;renderTools();
});
});
}

function submitTool(){
var email=document.getElementById('submitEmail').value.trim();
var url=document.getElementById('submitUrl').value.trim();
if(!email||!url){showToast('请填写邮箱和工具网址');return}
if(url.indexOf('http')!==0){showToast('请输入有效的网址');return}
showToast('提交成功！审核通过后会收录');
document.getElementById('submitEmail').value='';
document.getElementById('submitUrl').value='';
}

function showToast(msg){
var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
setTimeout(function(){t.classList.remove('show')},3000);
}

function toggleTheme(){
document.body.classList.toggle('light');
var isLight=document.body.classList.contains('light');
localStorage.setItem('theme',isLight?'light':'dark');
document.getElementById('themeToggle').innerHTML=isLight?'&#9728;&#65039;':'&#127769;';
}

(function(){
var s=localStorage.getItem('theme');
if(s==='light'){document.body.classList.add('light');
document.getElementById('themeToggle').innerHTML='&#9728;&#65039;';}
})();

window.addEventListener('scroll',function(){
var b=document.getElementById('backToTop');
if(window.scrollY>400)b.classList.add('vis');else b.classList.remove('vis');
});

init();
</script>
</body>
</html>
