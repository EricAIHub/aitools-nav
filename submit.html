<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交工具 - AiTool.so</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6C5CE7;
            --primary-light: #A29BFE;
            --secondary: #00CEC9;
            --bg: #0F0F1A;
            --card-bg: #1A1A2E;
            --text: #E8E8F0;
            --text-dim: #8888AA;
            --border: #2A2A45;
            --success: #00B894;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, rgba(108,92,231,0.15) 0%, rgba(0,206,201,0.1) 100%);
            border-bottom: 1px solid var(--border);
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        nav a {
            color: var(--text-dim);
            text-decoration: none;
            margin-left: 28px;
            font-size: 15px;
        }
        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 0 24px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 12px;
        }
        .subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
            font-size: 16px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
        }
        label .required { color: var(--accent); }
        input, textarea, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            border-color: var(--primary);
        }
        textarea { resize: vertical; min-height: 100px; }
        select option { background: var(--card-bg); }
        .hint {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 6px;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 12px;
        }
        .btn-submit:hover { opacity: 0.9; }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
        .success-msg {
            display: none;
            text-align: center;
            padding: 60px 24px;
        }
        .success-msg .emoji { font-size: 64px; margin-bottom: 16px; }
        .success-msg h2 { margin-bottom: 12px; }
        .success-msg p { color: var(--text-dim); }
        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--primary-light);
            text-decoration: none;
        }
        footer {
            border-top: 1px solid var(--border);
            padding: 40px 24px;
            text-align: center;
            color: var(--text-dim);
            font-size: 14px;
            margin-top: 80px;
        }
        footer a { color: var(--primary-light); text-decoration: none; }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <a href="/" class="logo">AiTool.so</a>
        <nav>
            <a href="/">← 返回首页</a>
        </nav>
    </div>
</header>

<div class="container">
    <div id="formSection">
        <h1>🚀 提交 AI 工具</h1>
        <p class="subtitle">发现了好用的 AI 工具？填写以下信息，审核通过后将免费收录到 AiTool.so</p>
        
        <form id="submitForm" onsubmit="return handleSubmit(event)">
            <div class="form-group">
                <label>工具名称 <span class="required">*</span></label>
                <input type="text" id="name" placeholder="例如：ChatGPT" required>
            </div>
            
            <div class="form-group">
                <label>工具网址 <span class="required">*</span></label>
                <input type="url" id="url" placeholder="https://..." required>
                <div class="hint">请填写工具的官方网站地址</div>
            </div>
            
            <div class="form-group">
                <label>工具分类 <span class="required">*</span></label>
                <select id="category" required>
                    <option value="">请选择分类</option>
                    <option value="chat">💬 AI 对话</option>
                    <option value="image">🎨 AI 绘画</option>
                    <option value="video">🎬 AI 视频</option>
                    <option value="audio">🎵 AI 音频</option>
                    <option value="writing">✍️ AI 写作</option>
                    <option value="code">💻 AI 编程</option>
                    <option value="design">🖼️ AI 设计</option>
                    <option value="productivity">⚡ 效率工具</option>
                    <option value="education">📚 AI 教育</option>
                    <option value="business">💼 AI 商业</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>工具简介 <span class="required">*</span></label>
                <textarea id="description" placeholder="用一两句话描述这个工具的核心功能..." required></textarea>
            </div>
            
            <div class="form-group">
                <label>定价模式</label>
                <input type="text" id="pricing" placeholder="例如：免费 / $10/月 / 免费+付费">
                <div class="hint">留空将显示为"未知"</div>
            </div>
            
            <div class="form-group">
                <label>标签（逗号分隔）</label>
                <input type="text" id="tags" placeholder="例如：对话, 写作, 中文">
            </div>
            
            <div class="form-group">
                <label>你的邮箱 <span class="required">*</span></label>
                <input type="email" id="email" placeholder="your@email.com" required>
                <div class="hint">仅用于审核通知，不会公开</div>
            </div>
            
            <button type="submit" class="btn-submit">提交工具 →</button>
        </form>
    </div>
    
    <div class="success-msg" id="successMsg">
        <div class="emoji">🎉</div>
        <h2>提交成功！</h2>
        <p>我们会在 1-3 个工作日内审核，通过后会发送通知到你的邮箱</p>
        <a href="/" class="back-link">← 返回首页</a>
    </div>
</div>

<footer>
    <p>© 2026 <a href="/">AiTool.so</a> — 发现最好的 AI 工具</p>
</footer>

<script>
function handleSubmit(e) {
    e.preventDefault();
    
    const data = {
        name: document.getElementById('name').value,
        url: document.getElementById('url').value,
        category: document.getElementById('category').value,
        description: document.getElementById('description').value,
        pricing: document.getElementById('pricing').value || '未知',
        tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(Boolean),
        email: document.getElementById('email').value,
        submittedAt: new Date().toISOString()
    };
    
    // In production: POST to backend API
    // For now: save to localStorage and show success
    const submissions = JSON.parse(localStorage.getItem('aitool_submissions') || '[]');
    submissions.push(data);
    localStorage.setItem('aitool_submissions', JSON.stringify(submissions));
    
    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
    
    return false;
}
</script>
</body>
</html>
